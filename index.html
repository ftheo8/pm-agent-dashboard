<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pm-agent · painel</title>
<style>
  :root {
    --surface-1: #fcfcfb;
    --page: #f9f9f7;
    --ink: #0b0b0b;
    --ink-2: #52514e;
    --muted: #898781;
    --grid: #e1e0d9;
    --baseline: #c3c2b7;
    --border: rgba(11,11,11,0.10);
    --blue: #2a78d6;
    --aqua: #1baf7a;
    --yellow: #eda100;
    --green: #008300;
    --violet: #4a3aa7;
    --red: #e34948;
    --good: #0ca30c;
    --accent: var(--blue);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --ink: #ffffff;
      --ink-2: #c3c2b7;
      --muted: #898781;
      --grid: #2c2c2a;
      --baseline: #383835;
      --border: rgba(255,255,255,0.10);
      --blue: #3987e5;
      --aqua: #199e70;
      --yellow: #c98500;
      --green: #008300;
      --violet: #9085e9;
      --red: #e66767;
      --good: #0ca30c;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--page); color: var(--ink);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 14px 20px; border-bottom: 1px solid var(--grid);
    position: sticky; top: 0; background: var(--page); z-index: 10;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 650; }
  header h1 span { color: var(--muted); font-weight: 400; }
  nav { display: flex; gap: 4px; background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
  nav button {
    border: 0; background: transparent; color: var(--ink-2); font: inherit;
    padding: 6px 14px; border-radius: 8px; cursor: pointer;
  }
  nav button.active { background: var(--accent); color: #fff; }
  nav button:not(.active):hover { background: var(--grid); }
  .btn {
    border: 1px solid var(--border); background: var(--surface-1); color: var(--ink);
    font: inherit; padding: 6px 14px; border-radius: 9px; cursor: pointer;
  }
  .btn:hover { background: var(--grid); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.danger { color: var(--red); border-color: color-mix(in srgb, var(--red) 40%, transparent); }
  .btn.small { padding: 3px 10px; font-size: 12px; border-radius: 7px; }
  label.toggle { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; cursor: pointer; user-select: none; }
  #meta { margin-left: auto; color: var(--muted); font-size: 12px; }
  main { padding: 20px; }

  .board { display: flex; gap: 14px; overflow-x: auto; align-items: flex-start; padding-bottom: 12px; }
  .col { min-width: 260px; width: 260px; flex: none; }
  .col-head { display: flex; align-items: center; gap: 8px; padding: 4px 6px 10px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .col-head b { font-size: 13px; font-weight: 600; }
  .col-head .count { color: var(--muted); font-size: 12px; margin-left: auto; }
  .col-body { display: flex; flex-direction: column; gap: 10px; min-height: 60px; border-radius: 12px; }
  .col-body.dragover { outline: 2px dashed var(--accent); outline-offset: 4px; }

  .card {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }
  .card h3 { margin: 0 0 6px; font-size: 14px; font-weight: 600; }
  .card .sub { color: var(--muted); font-size: 12px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .prazo-chip { color: var(--ink-2); }
  .prazo-chip.overdue { color: var(--red); font-weight: 600; }
  .clip { color: var(--muted); }
  .progress { height: 4px; background: var(--grid); border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .progress i { display: block; height: 100%; border-radius: 2px; background: var(--accent); }
  .arch-badge { font-size: 10px; font-weight: 700; letter-spacing: .4px; color: var(--muted); border: 1px solid var(--grid); border-radius: 5px; padding: 1px 6px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
  .bigcard { background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; cursor: pointer; }
  .bigcard h3 { margin: 0; font-size: 15px; }
  .bigcard .top { display: flex; align-items: flex-start; gap: 10px; justify-content: space-between; margin-bottom: 8px; }
  .status-chip {
    font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px;
    color: #fff; white-space: nowrap; flex: none;
  }
  .steps { margin: 10px 0 0; padding: 0; list-style: none; }
  .steps li { display: flex; gap: 8px; align-items: flex-start; padding: 3px 0; color: var(--ink-2); }
  .steps input[type=checkbox] { margin-top: 3px; accent-color: var(--good); cursor: pointer; }
  .steps li.done > span { color: var(--muted); text-decoration: line-through; }
  .notas { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--grid); color: var(--muted); font-size: 12px; white-space: pre-wrap; }

  .agenda-wrap { display: grid; grid-template-columns: minmax(0, 2fr) minmax(260px, 1fr); gap: 20px; align-items: start; }
  @media (max-width: 900px) { .agenda-wrap { grid-template-columns: 1fr; } }
  .cal { background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-head b { font-size: 15px; text-transform: capitalize; }
  .cal-head button { border: 1px solid var(--border); background: transparent; color: var(--ink); border-radius: 8px; padding: 4px 12px; cursor: pointer; font: inherit; }
  .cal-head button:hover { background: var(--grid); }
  .cal-month-events { margin-bottom: 10px; display: flex; flex-direction: column; gap: 6px; }
  .month-ev { font-size: 12px; padding: 6px 10px; border-radius: 8px; background: color-mix(in srgb, var(--yellow) 14%, var(--surface-1)); border: 1px solid color-mix(in srgb, var(--yellow) 40%, transparent); }
  .cal table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .cal th { color: var(--muted); font-weight: 500; font-size: 11px; padding: 4px; text-transform: uppercase; }
  .cal td { border: 1px solid var(--grid); height: 74px; vertical-align: top; padding: 4px 6px; font-size: 12px; }
  .cal td .d { color: var(--muted); }
  .cal td.today { outline: 2px solid var(--accent); outline-offset: -2px; }
  .cal td.today .d { color: var(--accent); font-weight: 700; }
  .cal td.other { background: color-mix(in srgb, var(--page) 60%, var(--surface-1)); }
  .cal-ev { margin-top: 3px; padding: 2px 6px; border-radius: 6px; color: #fff; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  .upcoming { background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
  .upcoming h3 { margin: 0 0 10px; font-size: 14px; }
  .up-item { display: flex; gap: 10px; padding: 8px 0; border-top: 1px solid var(--grid); align-items: baseline; }
  .up-item:first-of-type { border-top: 0; }
  .up-date { font-variant-numeric: tabular-nums; color: var(--ink-2); font-size: 12px; white-space: nowrap; min-width: 80px; }
  .up-none { color: var(--muted); }

  .gantt-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px; padding: 16px; overflow-x: auto; }
  .gantt-note { color: var(--muted); font-size: 12px; margin: 0 0 12px; }
  svg text { font: 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: var(--muted); }
  svg .rowlabel { fill: var(--ink); font-size: 12.5px; font-weight: 550; }
  svg .rowsub { fill: var(--muted); font-size: 10.5px; }
  .empty { color: var(--muted); padding: 40px; text-align: center; }

  /* ---------- modal ---------- */
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50;
    display: none; align-items: flex-start; justify-content: center; padding: 4vh 16px;
  }
  #overlay.open { display: flex; }
  #modal {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 16px;
    width: 640px; max-width: 100%; max-height: 92vh; overflow-y: auto; padding: 22px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  #modal h2 { margin: 0 0 4px; font-size: 17px; }
  .m-close { float: right; border: 0; background: transparent; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; padding: 2px 6px; }
  .m-close:hover { color: var(--ink); }
  .m-sec { margin-top: 18px; }
  .m-sec > h4 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  .m-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
  .m-row label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 3px; }
  input[type=text], input[type=date], input[type=month], input[type=datetime-local], input[type=number], select, textarea {
    font: inherit; color: var(--ink); background: var(--page);
    border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px;
  }
  textarea { width: 100%; min-height: 84px; resize: vertical; }
  .field { flex: 1; min-width: 130px; }
  .field input, .field select { width: 100%; }
  .m-list { list-style: none; margin: 0; padding: 0; }
  .m-list li { display: flex; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--grid); }
  .m-list li:last-child { border-bottom: 0; }
  .m-list .grow { flex: 1; min-width: 0; overflow-wrap: anywhere; }
  .m-list .dim { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .icon-btn { border: 0; background: transparent; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 6px; }
  .icon-btn:hover { color: var(--red); background: var(--grid); }
  .att-link { color: var(--accent); cursor: pointer; text-decoration: none; }
  .att-link:hover { text-decoration: underline; }
  .m-footer { display: flex; gap: 10px; margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--grid); flex-wrap: wrap; }
  .m-footer .spacer { flex: 1; }
  .muted-note { color: var(--muted); font-size: 12px; }

  /* ---------- campos de data com calendário ---------- */
  .datewrap { display: flex; align-items: stretch; gap: 0; }
  .datewrap input { flex: 1; min-width: 0; border-top-right-radius: 0; border-bottom-right-radius: 0; border-right: 0; }
  .datewrap input::-webkit-calendar-picker-indicator { display: none; }
  .cal-btn {
    border: 1px solid var(--border); background: var(--page); color: var(--muted);
    border-top-right-radius: 8px; border-bottom-right-radius: 8px; cursor: pointer;
    padding: 0 9px; font-size: 14px; line-height: 1;
  }
  .cal-btn:hover { background: var(--grid); color: var(--ink); }

  /* ---------- visualizador de anexos ---------- */
  #viewer {
    position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 70;
    display: none; flex-direction: column;
  }
  #viewer.open { display: flex; }
  #v-bar { display: flex; gap: 12px; align-items: center; padding: 12px 18px; color: #fff; }
  #v-name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  #v-bar .btn { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.25); color: #fff; }
  #v-bar .btn:hover { background: rgba(255,255,255,.22); }
  #v-body { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 0 18px 18px; min-height: 0; }
  #v-body img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 10px; }
  #v-body iframe { width: 100%; height: 100%; border: 0; border-radius: 10px; background: #fff; }
  #v-body video { max-width: 100%; max-height: 100%; border-radius: 10px; }
  #v-body pre {
    max-width: 100%; max-height: 100%; overflow: auto; margin: 0;
    background: var(--surface-1); color: var(--ink); border-radius: 10px; padding: 16px 20px;
    font: 12.5px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap;
  }
  #v-body .v-fallback { color: #fff; text-align: center; }
  #v-loading { color: rgba(255,255,255,.7); }

  /* ---------- filtros ---------- */
  #filters {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    padding: 10px 20px; border-bottom: 1px solid var(--grid); background: var(--page);
  }
  #filters input, #filters select { padding: 5px 9px; font-size: 13px; }
  #filters input[type=search] { min-width: 160px; flex: 1; max-width: 260px; }
  #filters select { max-width: 170px; }
  #f-clear { display: none; }
  #f-clear.on { display: inline-block; }

  .tagchip {
    font-size: 10.5px; font-weight: 600; padding: 2px 8px; border-radius: 12px;
    background: color-mix(in srgb, var(--accent) 14%, var(--surface-1));
    color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
    white-space: nowrap;
  }
  .tagchip.proj {
    background: color-mix(in srgb, var(--violet) 14%, var(--surface-1));
    color: var(--violet); border-color: color-mix(in srgb, var(--violet) 35%, transparent);
  }

  /* ---------- chat ---------- */
  #chat {
    position: fixed; top: 0; right: 0; bottom: 0; width: 400px; max-width: 100vw; z-index: 60;
    background: var(--surface-1); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; transform: translateX(105%); transition: transform .22s ease;
    box-shadow: -12px 0 40px rgba(0,0,0,.25);
  }
  #chat.open { transform: translateX(0); }
  #c-head { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--grid); }
  #c-head b { flex: 1; }
  #c-msgs { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .bubble { max-width: 85%; padding: 9px 12px; border-radius: 14px; font-size: 13.5px; white-space: pre-wrap; overflow-wrap: anywhere; }
  .bubble.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .bubble.assistant { align-self: flex-start; background: var(--page); border: 1px solid var(--grid); border-bottom-left-radius: 4px; }
  .bubble .when { display: block; font-size: 10px; opacity: .55; margin-top: 4px; }
  #c-typing { align-self: flex-start; color: var(--muted); font-size: 12px; padding: 0 4px; display: none; }
  #c-typing.on { display: block; }
  #c-input { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--grid); }
  #c-text { flex: 1; resize: none; min-height: 40px; max-height: 120px; }
</style>
</head>
<body>
<header>
  <h1>pm-agent <span>· painel de projetos</span></h1>
  <nav id="nav">
    <button data-view="kanban" class="active">Kanban</button>
    <button data-view="cards">Cards</button>
    <button data-view="agenda">Agenda</button>
    <button data-view="gantt">Gantt</button>
  </nav>
  <button class="btn primary" id="btn-new">+ Novo</button>
  <button class="btn" id="btn-chat">💬 Chat</button>
  <label class="toggle"><input type="checkbox" id="show-arch"> arquivados</label>
  <div id="meta"></div>
</header>
<div id="filters">
  <input type="search" id="f-q" placeholder="buscar título, notas, passos...">
  <select id="f-empresa"></select>
  <select id="f-projeto"></select>
  <select id="f-status"></select>
  <select id="f-prazo">
    <option value="">prazo: todos</option>
    <option value="atrasado">⚠ atrasados</option>
    <option value="7d">próximos 7 dias</option>
    <option value="30d">próximos 30 dias</option>
    <option value="sem">sem prazo</option>
  </select>
  <button class="btn small" id="f-clear">limpar filtros ×</button>
</div>
<main id="main"></main>

<div id="chat">
  <div id="c-head">
    <b>💬 Gerente de Projetos</b>
    <span class="muted-note">mesma conversa do Telegram</span>
    <button class="m-close" id="c-close">×</button>
  </div>
  <div id="c-msgs"></div>
  <div id="c-typing">digitando…</div>
  <div id="c-input">
    <textarea id="c-text" placeholder="fala com o gerente..." rows="1"></textarea>
    <button class="btn primary" id="c-send">enviar</button>
  </div>
</div>

<div id="overlay"><div id="modal"></div></div>

<div id="viewer">
  <div id="v-bar">
    <span id="v-name"></span>
    <button class="btn small" id="v-dl">⬇ baixar</button>
    <button class="btn small" id="v-close">× fechar</button>
  </div>
  <div id="v-body"></div>
</div>

<script>
const $ = (s, el = document) => el.querySelector(s);
const API = 'https://iucqufccyboilasswnun.supabase.co/functions/v1/dashboard';
let KEY = new URLSearchParams(location.search).get('key') || localStorage.getItem('pm_key') || '';
if (new URLSearchParams(location.search).get('key')) {
  localStorage.setItem('pm_key', KEY);
  history.replaceState(null, '', location.pathname); // tira a chave da URL
}
let TASKS = [];
let VIEW = 'kanban';
let SHOW_ARCH = false;
let MODAL_SLUG = null; // slug aberto no modal; '' = criando novo
let DRAGGING = false;
let CAL = (() => { const n = new Date(); return { y: n.getFullYear(), m: n.getMonth() }; })();

const STATUS = [
  { key: 'a fazer',             color: 'var(--violet)' },
  { key: 'em andamento',        color: 'var(--blue)' },
  { key: 'a verificar',         color: 'var(--yellow)' },
  { key: 'aguardando detalhes', color: 'var(--aqua)' },
  { key: 'concluído',           color: 'var(--good)' },
  { key: 'mesclado',            color: 'var(--muted)' },
];
const statusColor = (s) => (STATUS.find((x) => x.key === s) || { color: 'var(--muted)' }).color;

const MESES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const fmtDate = (iso) => { const [y, m, d] = iso.split('-'); return `${Number(d)}/${MESES[Number(m) - 1]}`; };
const fmtDateTime = (iso) => new Date(iso).toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo', day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
const todayISO = () => new Date().toISOString().slice(0, 10);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
const fmtSize = (b) => b > 1048576 ? (b / 1048576).toFixed(1) + ' MB' : Math.max(1, Math.round(b / 1024)) + ' KB';

function prazoChip(t) {
  if (t.prazo.date) {
    const over = t.prazo.date < todayISO() && !['concluído', 'mesclado'].includes(t.status);
    return `<span class="prazo-chip ${over ? 'overdue' : ''}">⏱ ${fmtDate(t.prazo.date)}${over ? ' (atrasado)' : ''}</span>`;
  }
  if (t.prazo.month) { const [y, m] = t.prazo.month.split('-'); return `<span class="prazo-chip">⏱ ${MESES[Number(m) - 1]}/${y}</span>`; }
  if (t.prazo.raw) return `<span class="prazo-chip">⏱ ${esc(t.prazo.raw)}</span>`;
  return `<span class="prazo-chip" style="color:var(--muted)">sem prazo</span>`;
}
const progress = (t) => {
  const total = t.steps.length, done = t.steps.filter((s) => s.done).length;
  return { total, done, pct: total ? Math.round((100 * done) / total) : 0 };
};
const FILTERS = { q: '', empresa: '', projeto: '', status: '', prazo: '' };

function matchesFilters(t) {
  if (!SHOW_ARCH && t.archived) return false;
  if (FILTERS.empresa && t.empresa !== FILTERS.empresa) return false;
  if (FILTERS.projeto && t.projeto !== FILTERS.projeto) return false;
  if (FILTERS.status && t.status !== FILTERS.status) return false;
  if (FILTERS.prazo) {
    const today = todayISO();
    const in7 = new Date(Date.now() + 7 * 86400000).toISOString().slice(0, 10);
    const in30 = new Date(Date.now() + 30 * 86400000).toISOString().slice(0, 10);
    const d = t.prazo.date;
    const closed = ['concluído', 'mesclado'].includes(t.status);
    if (FILTERS.prazo === 'atrasado' && !(d && d < today && !closed)) return false;
    if (FILTERS.prazo === '7d' && !(d && d >= today && d <= in7)) return false;
    if (FILTERS.prazo === '30d' && !(d && d >= today && d <= in30)) return false;
    if (FILTERS.prazo === 'sem' && (d || t.prazo.month || t.prazo.raw)) return false;
  }
  if (FILTERS.q) {
    const q = FILTERS.q.toLowerCase();
    const hay = [t.title, t.notas, t.empresa, t.projeto, ...t.steps.map((s) => s.label)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
const visible = () => TASKS.filter(matchesFilters);
const bySlug = (slug) => TASKS.find((t) => t.id === slug);
const distinct = (field) => [...new Set(TASKS.map((t) => t[field]).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'pt'));

function renderFilters() {
  const opt = (v, label, cur) => `<option value="${esc(v)}" ${v === cur ? 'selected' : ''}>${esc(label)}</option>`;
  $('#f-empresa').innerHTML = opt('', 'empresa: todas', FILTERS.empresa) + distinct('empresa').map((e) => opt(e, e, FILTERS.empresa)).join('');
  $('#f-projeto').innerHTML = opt('', 'projeto: todos', FILTERS.projeto) + distinct('projeto').map((p) => opt(p, p, FILTERS.projeto)).join('');
  const sts = [...new Set(TASKS.map((t) => t.status))];
  $('#f-status').innerHTML = opt('', 'status: todos', FILTERS.status) + STATUS.filter((s) => sts.includes(s.key)).map((s) => opt(s.key, s.key, FILTERS.status)).join('');
  $('#f-clear').classList.toggle('on', Boolean(FILTERS.q || FILTERS.empresa || FILTERS.projeto || FILTERS.status || FILTERS.prazo));
}

async function api(path, opts) {
  const res = await fetch(`${API}${path}${path.includes('?') ? '&' : '?'}key=${encodeURIComponent(KEY)}`, opts);
  if (res.status === 401) {
    localStorage.removeItem('pm_key');
    KEY = prompt('Chave de acesso do painel:') || '';
    if (KEY) { localStorage.setItem('pm_key', KEY); return api(path, opts); }
    throw new Error('sem chave');
  }
  const body = await res.json();
  if (!res.ok) { alert(body.error || 'erro na API'); throw new Error(body.error || 'api'); }
  return body;
}
const post = (path, obj) => api(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(obj) });

async function load() {
  TASKS = await api('/api/tasks');
  TASKS.sort((a, b) => a.title.localeCompare(b.title, 'pt'));
  $('#meta').textContent = `${visible().length} projetos · atualizado ${new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
  renderFilters();
  render();
  if (MODAL_SLUG) renderModal(MODAL_SLUG); // mantém o modal em dia
}

function render() {
  const main = $('#main');
  document.querySelectorAll('#nav button').forEach((b) => b.classList.toggle('active', b.dataset.view === VIEW));
  if (!visible().length) { main.innerHTML = '<div class="empty">Nenhum projeto por aqui.</div>'; return; }
  if (VIEW === 'kanban') renderKanban(main);
  else if (VIEW === 'cards') renderCards(main);
  else if (VIEW === 'agenda') renderAgenda(main);
  else renderGantt(main);
}

function bindCardClicks(main) {
  main.querySelectorAll('[data-open]').forEach((el) => {
    el.addEventListener('click', (e) => {
      if (DRAGGING) return;
      if (e.target.closest('input,button,a,select')) return;
      openModal(el.dataset.open);
    });
  });
}

/* ================= kanban ================= */
function renderKanban(main) {
  const items0 = visible();
  const known = STATUS.map((s) => s.key);
  const extras = [...new Set(items0.map((t) => t.status))].filter((s) => !known.includes(s));
  const cols = [...STATUS.map((s) => s.key), ...extras];
  main.innerHTML = `<div class="board">` + cols.map((st) => {
    const items = items0.filter((t) => t.status === st);
    if (!items.length && !['em andamento', 'a verificar', 'aguardando detalhes', 'concluído'].includes(st)) return '';
    return `<div class="col">
      <div class="col-head"><span class="dot" style="background:${statusColor(st)}"></span><b>${st}</b><span class="count">${items.length}</span></div>
      <div class="col-body" data-status="${st}">${items.map(cardHTML).join('')}</div>
    </div>`;
  }).join('') + `</div>`;

  main.querySelectorAll('.card').forEach((el) => {
    el.draggable = true;
    el.addEventListener('dragstart', (e) => { DRAGGING = true; e.dataTransfer.setData('text/plain', el.dataset.open); });
    el.addEventListener('dragend', () => setTimeout(() => { DRAGGING = false; }, 50));
  });
  main.querySelectorAll('.col-body').forEach((col) => {
    col.addEventListener('dragover', (e) => { e.preventDefault(); col.classList.add('dragover'); });
    col.addEventListener('dragleave', () => col.classList.remove('dragover'));
    col.addEventListener('drop', async (e) => {
      e.preventDefault(); col.classList.remove('dragover');
      const slug = e.dataTransfer.getData('text/plain');
      await post('/api/task/update', { slug, status: col.dataset.status });
      load();
    });
  });
  bindCardClicks(main);
}
function cardHTML(t) {
  const p = progress(t);
  return `<div class="card" data-open="${t.id}">
    <h3>${esc(t.title)}</h3>
    ${t.empresa || t.projeto ? `<div class="sub" style="margin-bottom:6px">${t.empresa ? `<span class="tagchip">${esc(t.empresa)}</span>` : ''}${t.projeto ? `<span class="tagchip proj">${esc(t.projeto)}</span>` : ''}</div>` : ''}
    <div class="sub">${prazoChip(t)}${p.total ? `<span>${p.done}/${p.total}</span>` : ''}${t.attachments.length ? `<span class="clip">📎${t.attachments.length}</span>` : ''}${t.archived ? '<span class="arch-badge">ARQ</span>' : ''}</div>
    ${p.total ? `<div class="progress"><i style="width:${p.pct}%;background:${statusColor(t.status)}"></i></div>` : ''}
  </div>`;
}

/* ================= cards ================= */
function renderCards(main) {
  main.innerHTML = `<div class="grid">` + visible().map((t) => `
    <div class="bigcard" data-open="${t.id}">
      <div class="top"><h3>${esc(t.title)}</h3><span class="status-chip" style="background:${statusColor(t.status)}">${t.status}</span></div>
      <div class="sub" style="color:var(--muted);font-size:12px">${t.empresa ? `<span class="tagchip">${esc(t.empresa)}</span>` : ''}${t.projeto ? `<span class="tagchip proj">${esc(t.projeto)}</span>` : ''} ${prazoChip(t)} ${t.attachments.length ? `<span class="clip">📎${t.attachments.length}</span>` : ''} ${t.archived ? '<span class="arch-badge">ARQ</span>' : ''}</div>
      <ul class="steps">${t.steps.map((s) => `
        <li class="${s.done ? 'done' : ''}"><input type="checkbox" ${s.done ? 'checked' : ''} data-step="${s.id}"><span>${esc(s.label)}</span></li>`).join('')}
      </ul>
      ${t.notas ? `<div class="notas">${esc(t.notas).replace(/^- /gm, '• ')}</div>` : ''}
    </div>`).join('') + `</div>`;
  main.querySelectorAll('.steps input').forEach((cb) => {
    cb.addEventListener('change', async () => {
      await post('/api/step', { id: Number(cb.dataset.step), done: cb.checked });
      load();
    });
  });
  bindCardClicks(main);
}

/* ================= agenda ================= */
function renderAgenda(main) {
  const items = visible().filter((t) => !t.archived);
  const { y, m } = CAL;
  const first = new Date(y, m, 1);
  const startDow = first.getDay();
  const daysIn = new Date(y, m + 1, 0).getDate();
  const monthKey = `${y}-${String(m + 1).padStart(2, '0')}`;
  const byDate = {};
  for (const t of items) if (t.prazo.date) (byDate[t.prazo.date] ??= []).push(t);
  const monthEvs = items.filter((t) => t.prazo.month === monthKey);
  const today = todayISO();

  let cells = '';
  for (let i = 0; i < 42; i++) {
    const dnum = i - startDow + 1;
    if (dnum < 1 || dnum > daysIn) { cells += `<td class="other"></td>`; if (i % 7 === 6) cells += '</tr><tr>'; continue; }
    const iso = `${monthKey}-${String(dnum).padStart(2, '0')}`;
    const evs = (byDate[iso] || []).map((t) => `<div class="cal-ev" data-open="${t.id}" style="background:${statusColor(t.status)}" title="${esc(t.title)}">${esc(t.title)}</div>`).join('');
    cells += `<td class="${iso === today ? 'today' : ''}"><span class="d">${dnum}</span>${evs}</td>`;
    if (i % 7 === 6) cells += '</tr><tr>';
  }

  const dated = items.filter((t) => t.prazo.date && t.prazo.date >= today).sort((a, b) => a.prazo.date.localeCompare(b.prazo.date));
  const monthly = items.filter((t) => t.prazo.month && t.prazo.month >= today.slice(0, 7)).sort((a, b) => a.prazo.month.localeCompare(b.prazo.month));
  const noPrazo = items.filter((t) => !t.prazo.date && !t.prazo.month && !['concluído', 'mesclado'].includes(t.status));
  const alerts = items.flatMap((t) => t.alerts.filter((a) => !a.fired).map((a) => ({ ...a, task: t.title })))
    .sort((a, b) => a.fire_at.localeCompare(b.fire_at)).slice(0, 8);

  main.innerHTML = `<div class="agenda-wrap">
    <div class="cal">
      <div class="cal-head">
        <button id="prev">‹</button>
        <b>${first.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' })}</b>
        <button id="next">›</button>
      </div>
      <div class="cal-month-events">${monthEvs.map((t) => `<div class="month-ev">📌 <b>${esc(t.title)}</b> — prazo em ${MESES[m]}/${y} (sem data exata)</div>`).join('')}</div>
      <table><tr><th>dom</th><th>seg</th><th>ter</th><th>qua</th><th>qui</th><th>sex</th><th>sáb</th></tr><tr>${cells}</tr></table>
    </div>
    <div class="upcoming">
      <h3>Próximos prazos</h3>
      ${dated.map((t) => `<div class="up-item"><span class="up-date">${fmtDate(t.prazo.date)}</span><span>${esc(t.title)}</span></div>`).join('')}
      ${monthly.map((t) => { const [yy, mm] = t.prazo.month.split('-'); return `<div class="up-item"><span class="up-date">${MESES[Number(mm) - 1]}/${yy}</span><span>${esc(t.title)} <span style="color:var(--muted)">(mês)</span></span></div>`; }).join('')}
      ${!dated.length && !monthly.length ? '<div class="up-none">Nenhum prazo definido.</div>' : ''}
      ${alerts.length ? `<h3 style="margin-top:16px">Alertas agendados</h3>${alerts.map((a) => `<div class="up-item"><span class="up-date">${fmtDateTime(a.fire_at)}</span><span>⏰ ${esc(a.message)} <span style="color:var(--muted)">(${esc(a.task)})</span></span></div>`).join('')}` : ''}
      ${noPrazo.length ? `<h3 style="margin-top:16px">Sem prazo</h3>${noPrazo.map((t) => `<div class="up-item"><span class="up-date">—</span><span>${esc(t.title)}</span></div>`).join('')}` : ''}
    </div>
  </div>`;
  $('#prev').onclick = () => { CAL.m--; if (CAL.m < 0) { CAL.m = 11; CAL.y--; } render(); };
  $('#next').onclick = () => { CAL.m++; if (CAL.m > 11) { CAL.m = 0; CAL.y++; } render(); };
  bindCardClicks(main);
}

/* ================= gantt ================= */
function renderGantt(main) {
  const rows = visible().filter((t) => !['mesclado'].includes(t.status) && !t.archived);
  const today = new Date(todayISO());
  const D = 86400000;
  const ends = rows.map((t) => {
    if (t.prazo.date) return new Date(t.prazo.date);
    if (t.prazo.month) { const [y, m] = t.prazo.month.split('-').map(Number); return new Date(y, m, 0); }
    return null;
  });
  const starts = rows.map((t) => new Date(t.start));
  let min = new Date(Math.min(...starts, today));
  let max = new Date(Math.max(...ends.filter(Boolean).map(Number), Number(today) + 21 * D));
  min = new Date(min.getFullYear(), min.getMonth(), 1);
  max = new Date(max.getFullYear(), max.getMonth() + 1, 1);

  const LEFT = 210, RW = 26, TOP = 34, W = LEFT + Math.max(560, Math.min(1100, ((max - min) / D) * 6)) + 20;
  const span = max - min;
  const x = (d) => LEFT + ((d - min) / span) * (W - LEFT - 20);
  const H = TOP + rows.length * (RW + 12) + 16;

  let months = '';
  for (let d = new Date(min); d < max; d = new Date(d.getFullYear(), d.getMonth() + 1, 1)) {
    months += `<line x1="${x(d)}" y1="${TOP - 8}" x2="${x(d)}" y2="${H - 10}" stroke="var(--grid)"/>` +
      `<text x="${x(d) + 4}" y="${TOP - 12}">${MESES[d.getMonth()]}/${String(d.getFullYear()).slice(2)}</text>`;
  }

  const bars = rows.map((t, i) => {
    const yPos = TOP + i * (RW + 12);
    const s = x(starts[i]);
    const end = ends[i];
    const color = statusColor(t.status).replace('var(--muted)', 'var(--baseline)');
    const p = progress(t);
    const label = `<text class="rowlabel" x="0" y="${yPos + 13}" style="cursor:pointer" data-open="${t.id}">${esc(t.title.length > 26 ? t.title.slice(0, 25) + '…' : t.title)}</text>` +
      `<text class="rowsub" x="0" y="${yPos + 25}">${t.status}${p.total ? ` · ${p.done}/${p.total}` : ''}</text>`;
    if (end) {
      const e = Math.max(x(end), s + 8);
      const monthOnly = !t.prazo.date;
      return label +
        `<rect x="${s}" y="${yPos + 4}" width="${e - s}" height="${RW - 8}" rx="4" fill="${color}" ${monthOnly ? 'opacity="0.45"' : 'opacity="0.9"'}>
           <title>${esc(t.title)}</title>
         </rect>` +
        (p.total ? `<rect x="${s}" y="${yPos + 4}" width="${(e - s) * p.pct / 100}" height="${RW - 8}" rx="4" fill="${color}"/>` : '');
    }
    const e = x(today);
    return label +
      `<rect x="${s}" y="${yPos + 4}" width="${Math.max(e - s, 8)}" height="${RW - 8}" rx="4" fill="${color}" opacity="0.9"><title>${esc(t.title)} — sem prazo definido</title></rect>` +
      `<line x1="${e + 2}" y1="${yPos + RW / 2}" x2="${e + 40}" y2="${yPos + RW / 2}" stroke="${color}" stroke-width="2" stroke-dasharray="3 4"/>`;
  }).join('');

  main.innerHTML = `<div class="gantt-card">
    <p class="gantt-note">Barra sólida = prazo definido · translúcida = prazo só de mês · tracejada = sem prazo (em aberto). Clique no nome pra abrir os detalhes.</p>
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
      ${months}
      <line x1="${x(today)}" y1="${TOP - 8}" x2="${x(today)}" y2="${H - 10}" stroke="var(--red)" stroke-width="1.5"/>
      <text x="${x(today) + 4}" y="${H - 2}" fill="var(--red)">hoje</text>
      ${bars}
    </svg>
  </div>`;
  main.querySelectorAll('[data-open]').forEach((el) => el.addEventListener('click', () => openModal(el.dataset.open)));
}

/* ================= modal ================= */
function openModal(slug) {
  MODAL_SLUG = slug ?? '';
  renderModal(MODAL_SLUG);
  $('#overlay').classList.add('open');
}
function closeModal() {
  MODAL_SLUG = null;
  $('#overlay').classList.remove('open');
}

function renderModal(slug) {
  const t = slug ? bySlug(slug) : null;
  if (slug && !t) { closeModal(); return; }
  const isNew = !t;
  const statusOpts = STATUS.map((s) => `<option value="${s.key}" ${t?.status === s.key ? 'selected' : ''}>${s.key}</option>`).join('');

  $('#modal').innerHTML = `
    <button class="m-close" id="m-close">×</button>
    <h2>${isNew ? 'Novo projeto' : esc(t.title)}</h2>
    ${isNew ? '' : `<div class="muted-note">${t.id}${t.archived ? ' · <b>arquivado</b>' : ''}</div>`}

    <div class="m-sec">
      <div class="m-row">
        <div class="field" style="flex:2"><label>Título</label><input type="text" id="m-title" value="${esc(t?.title ?? '')}"></div>
        <div class="field"><label>Status</label><select id="m-status">${statusOpts}</select></div>
      </div>
      <div class="m-row">
        <div class="field"><label>Empresa</label><input type="text" id="m-empresa" list="dl-empresa" value="${esc(t?.empresa ?? '')}" placeholder="ex: SBY"></div>
        <div class="field"><label>Projeto</label><input type="text" id="m-projeto" list="dl-projeto" value="${esc(t?.projeto ?? '')}" placeholder="ex: Edital FINEP"></div>
        <datalist id="dl-empresa">${distinct('empresa').map((e) => `<option value="${esc(e)}">`).join('')}</datalist>
        <datalist id="dl-projeto">${distinct('projeto').map((p) => `<option value="${esc(p)}">`).join('')}</datalist>
      </div>
      <div class="m-row">
        <div class="field"><label>Prazo (data exata)</label><div class="datewrap"><input type="date" id="m-prazo-date" value="${t?.prazo.date ?? ''}"><button type="button" class="cal-btn" data-pick="m-prazo-date" title="abrir calendário">📅</button></div></div>
        <div class="field"><label>ou mês</label><div class="datewrap"><input type="month" id="m-prazo-month" value="${t?.prazo.month ?? ''}"><button type="button" class="cal-btn" data-pick="m-prazo-month" title="abrir calendário">📅</button></div></div>
        <div class="field"><label>ou texto livre</label><input type="text" id="m-prazo-raw" value="${esc(t?.prazo.raw ?? '')}" placeholder="ex: depois do edital"></div>
      </div>
      <div class="m-row"><div class="field" style="flex:1 1 100%"><label>Notas</label><textarea id="m-notas">${esc(t?.notas ?? '')}</textarea></div></div>
      <button class="btn primary" id="m-save">${isNew ? 'Criar projeto' : 'Salvar alterações'}</button>
    </div>

    ${isNew ? '' : `
    <div class="m-sec">
      <h4>Passos</h4>
      <ul class="m-list">${t.steps.map((s) => `
        <li>
          <input type="checkbox" ${s.done ? 'checked' : ''} data-stepck="${s.id}" style="accent-color:var(--good)">
          <span class="grow" style="${s.done ? 'color:var(--muted);text-decoration:line-through' : ''}">${esc(s.label)}</span>
          <button class="icon-btn" data-stepedit="${s.id}" title="editar">✎</button>
          <button class="icon-btn" data-stepdel="${s.id}" title="remover">×</button>
        </li>`).join('')}
      </ul>
      <div class="m-row" style="margin-top:8px">
        <input type="text" id="m-newstep" placeholder="novo passo..." style="flex:1">
        <button class="btn small" id="m-addstep">adicionar</button>
      </div>
    </div>

    <div class="m-sec">
      <h4>Anexos</h4>
      <ul class="m-list">${t.attachments.map((a) => `
        <li>
          <span class="grow"><a class="att-link" data-file="${a.id}">📎 ${esc(a.filename)}</a></span>
          <span class="dim">${fmtSize(a.size)}</span>
          <button class="icon-btn" data-attdel="${a.id}" title="apagar">×</button>
        </li>`).join('') || '<li class="dim" style="border:0">nenhum anexo</li>'}
      </ul>
      <div class="m-row" style="margin-top:8px">
        <input type="file" id="m-file" style="flex:1">
        <button class="btn small" id="m-upload">enviar</button>
      </div>
    </div>

    <div class="m-sec">
      <h4>Alertas (chegam no Telegram)</h4>
      <ul class="m-list">${t.alerts.map((a) => `
        <li>
          <span class="grow">⏰ ${esc(a.message)} <span class="dim">(${esc(a.rule)})</span></span>
          <span class="dim">${a.fired ? 'disparado' : fmtDateTime(a.fire_at)}</span>
          <button class="icon-btn" data-alertdel="${a.id}" title="cancelar">×</button>
        </li>`).join('') || '<li class="dim" style="border:0">nenhum alerta</li>'}
      </ul>
      <div class="m-row" style="margin-top:8px">
        <input type="text" id="m-alertmsg" placeholder="mensagem do lembrete..." style="flex:1 1 100%">
      </div>
      <div class="m-row">
        <div class="field"><label>Data e hora</label><div class="datewrap"><input type="datetime-local" id="m-alertdt"><button type="button" class="cal-btn" data-pick="m-alertdt" title="abrir calendário">📅</button></div></div>
        <div class="field"><label>ou dias antes do prazo</label><input type="number" id="m-alertdays" min="0" placeholder="ex: 2" ${t.prazo.date ? '' : 'disabled title="defina um prazo com data exata"'}></div>
        <button class="btn small" id="m-addalert" style="align-self:flex-end">agendar</button>
      </div>
    </div>

    <div class="m-footer">
      <button class="btn" id="m-arch">${t.archived ? 'Restaurar' : 'Arquivar'}</button>
      <span class="spacer"></span>
      <button class="btn danger" id="m-del">Apagar de vez</button>
    </div>`}
  `;

  /* ------- binds ------- */
  $('#m-close').onclick = closeModal;

  $('#m-save').onclick = async () => {
    const body = {
      title: $('#m-title').value.trim(),
      status: $('#m-status').value,
      empresa: $('#m-empresa').value.trim(),
      projeto: $('#m-projeto').value.trim(),
      prazo_date: $('#m-prazo-date').value,
      prazo_month: $('#m-prazo-month').value,
      prazo_raw: $('#m-prazo-raw').value.trim(),
      notas: $('#m-notas').value,
    };
    if (!body.title) { alert('título obrigatório'); return; }
    if (isNew) {
      const r = await post('/api/task/create', body);
      MODAL_SLUG = r.slug;
    } else {
      await post('/api/task/update', { slug: t.id, ...body });
    }
    await load();
  };

  if (isNew) return;

  document.querySelectorAll('[data-stepck]').forEach((cb) => cb.onchange = async () => {
    await post('/api/step', { id: Number(cb.dataset.stepck), done: cb.checked }); load();
  });
  document.querySelectorAll('[data-stepedit]').forEach((b) => b.onclick = async () => {
    const s = t.steps.find((x) => x.id === Number(b.dataset.stepedit));
    const label = prompt('Editar passo:', s.label);
    if (label && label.trim()) { await post('/api/step/edit', { id: s.id, label: label.trim() }); load(); }
  });
  document.querySelectorAll('[data-stepdel]').forEach((b) => b.onclick = async () => {
    await post('/api/step/delete', { id: Number(b.dataset.stepdel) }); load();
  });
  $('#m-addstep').onclick = async () => {
    const label = $('#m-newstep').value.trim();
    if (!label) return;
    await post('/api/step/add', { slug: t.id, label }); load();
  };
  $('#m-newstep').onkeydown = (e) => { if (e.key === 'Enter') $('#m-addstep').click(); };

  document.querySelectorAll('.cal-btn').forEach((b) => b.onclick = () => {
    const input = document.getElementById(b.dataset.pick);
    if (input.showPicker) { try { input.showPicker(); } catch { input.focus(); } }
    else input.focus();
  });

  document.querySelectorAll('[data-file]').forEach((a) => a.onclick = () => {
    const att = t.attachments.find((x) => x.id === Number(a.dataset.file));
    if (att) openViewer(att);
  });
  document.querySelectorAll('[data-attdel]').forEach((b) => b.onclick = async () => {
    if (!confirm('Apagar este anexo?')) return;
    await post('/api/attachment/delete', { id: Number(b.dataset.attdel) }); load();
  });
  $('#m-upload').onclick = async () => {
    const f = $('#m-file').files[0];
    if (!f) { alert('escolha um arquivo'); return; }
    if (f.size > 40_000_000) { alert('máximo 40MB'); return; }
    await api(`/api/upload?slug=${encodeURIComponent(t.id)}&name=${encodeURIComponent(f.name)}`, {
      method: 'POST', headers: { 'Content-Type': f.type || 'application/octet-stream' }, body: f,
    });
    load();
  };

  document.querySelectorAll('[data-alertdel]').forEach((b) => b.onclick = async () => {
    await post('/api/alert/delete', { id: Number(b.dataset.alertdel) }); load();
  });
  $('#m-addalert').onclick = async () => {
    const message = $('#m-alertmsg').value.trim();
    if (!message) { alert('escreva a mensagem do lembrete'); return; }
    const dt = $('#m-alertdt').value;
    const days = $('#m-alertdays').value;
    const body = { slug: t.id, message };
    if (dt) body.fire_at = `${dt}:00-03:00`; // horário de São Paulo
    else if (days !== '') body.days_before = Number(days);
    else { alert('escolha data/hora ou dias antes do prazo'); return; }
    await post('/api/alert/add', body); load();
  };

  $('#m-arch').onclick = async () => {
    await post('/api/task/update', { slug: t.id, archived: !t.archived });
    await load();
  };
  $('#m-del').onclick = async () => {
    if (!confirm(`Apagar "${t.title}" de vez? Passos, anexos e alertas somem junto.`)) return;
    await post('/api/task/delete', { slug: t.id });
    closeModal(); load();
  };
}

/* ================= visualizador de anexos ================= */
async function openViewer(att) {
  const v = $('#viewer'), body = $('#v-body');
  $('#v-name').textContent = att.filename;
  body.innerHTML = '<div id="v-loading">carregando…</div>';
  v.classList.add('open');

  $('#v-dl').onclick = async () => {
    const d = await api(`/api/file?id=${att.id}&dl=1`);
    window.open(d.url, '_blank');
  };

  try {
    const r = await api(`/api/file?id=${att.id}`);
    const m = att.mime || '';
    if (m.startsWith('image/')) {
      body.innerHTML = `<img src="${r.url}" alt="${esc(att.filename)}">`;
    } else if (m === 'application/pdf') {
      body.innerHTML = `<iframe src="${r.url}" title="${esc(att.filename)}"></iframe>`;
    } else if (m.startsWith('video/')) {
      body.innerHTML = `<video controls autoplay src="${r.url}"></video>`;
    } else if (m.startsWith('audio/')) {
      body.innerHTML = `<audio controls autoplay src="${r.url}" style="width:min(480px,90%)"></audio>`;
    } else if (m.startsWith('text/') || ['application/json', 'application/xml', 'application/javascript'].includes(m)) {
      const txt = await (await fetch(r.url)).text();
      body.innerHTML = `<pre>${esc(txt.slice(0, 200000))}${txt.length > 200000 ? '\n… (truncado)' : ''}</pre>`;
    } else {
      body.innerHTML = `<div class="v-fallback">Sem visualização para este tipo de arquivo<br><span style="opacity:.7">(${esc(m || 'desconhecido')})</span><br><br>Use o botão <b>baixar</b> aí em cima ☝️</div>`;
    }
  } catch (e) {
    body.innerHTML = `<div class="v-fallback">Erro ao carregar o arquivo.</div>`;
  }
}
function closeViewer() { $('#viewer').classList.remove('open'); $('#v-body').innerHTML = ''; }
$('#v-close').onclick = closeViewer;
$('#viewer').addEventListener('click', (e) => { if (e.target.id === 'viewer' || e.target.id === 'v-body') closeViewer(); });

/* ================= chat com o gerente ================= */
const AGENT = 'https://iucqufccyboilasswnun.supabase.co/functions/v1/telegram';
let CHAT_OPEN = false;
let CHAT_BUSY = false;

function bubbleHTML(m) {
  const when = new Date(m.created_at).toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo', day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
  return `<div class="bubble ${m.role}">${esc(m.content)}<span class="when">${when}</span></div>`;
}

async function loadChat({ keepScroll = false } = {}) {
  const msgs = await api('/api/chat/history');
  const box = $('#c-msgs');
  const atBottom = !keepScroll || box.scrollHeight - box.scrollTop - box.clientHeight < 80;
  box.innerHTML = msgs.map(bubbleHTML).join('') || '<div class="muted-note">Sem mensagens ainda — diz um oi 👋</div>';
  if (atBottom) box.scrollTop = box.scrollHeight;
}

async function sendChat() {
  const ta = $('#c-text');
  const text = ta.value.trim();
  if (!text || CHAT_BUSY) return;
  CHAT_BUSY = true;
  ta.value = '';
  const box = $('#c-msgs');
  box.insertAdjacentHTML('beforeend', bubbleHTML({ role: 'user', content: text, created_at: new Date().toISOString() }));
  box.scrollTop = box.scrollHeight;
  $('#c-typing').classList.add('on');
  try {
    const res = await fetch(`${AGENT}?chat=1&key=${encodeURIComponent(KEY)}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }),
    });
    const body = await res.json();
    if (!res.ok) throw new Error(body.error || 'erro');
    box.insertAdjacentHTML('beforeend', bubbleHTML({ role: 'assistant', content: body.reply, created_at: new Date().toISOString() }));
    box.scrollTop = box.scrollHeight;
    load(); // o agente pode ter mexido nas tarefas
  } catch (e) {
    box.insertAdjacentHTML('beforeend', bubbleHTML({ role: 'assistant', content: '⚠️ Erro ao falar com o gerente. Tenta de novo?', created_at: new Date().toISOString() }));
  } finally {
    $('#c-typing').classList.remove('on');
    CHAT_BUSY = false;
    ta.focus();
  }
}

$('#btn-chat').onclick = () => {
  CHAT_OPEN = !CHAT_OPEN;
  $('#chat').classList.toggle('open', CHAT_OPEN);
  if (CHAT_OPEN) { loadChat(); $('#c-text').focus(); }
};
$('#c-close').onclick = () => { CHAT_OPEN = false; $('#chat').classList.remove('open'); };
$('#c-send').onclick = sendChat;
$('#c-text').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

/* ================= chrome ================= */
$('#nav').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  VIEW = b.dataset.view; render();
});
$('#btn-new').onclick = () => openModal(null);
$('#show-arch').onchange = (e) => { SHOW_ARCH = e.target.checked; load(); };
$('#f-q').addEventListener('input', (e) => { FILTERS.q = e.target.value.trim(); renderFilters(); render(); });
for (const f of ['empresa', 'projeto', 'status', 'prazo']) {
  $(`#f-${f}`).addEventListener('change', (e) => { FILTERS[f] = e.target.value; renderFilters(); render(); });
}
$('#f-clear').onclick = () => {
  Object.assign(FILTERS, { q: '', empresa: '', projeto: '', status: '', prazo: '' });
  $('#f-q').value = '';
  renderFilters(); render();
};
$('#overlay').addEventListener('click', (e) => { if (e.target.id === 'overlay') closeModal(); });
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  if ($('#viewer').classList.contains('open')) closeViewer();
  else if (CHAT_OPEN) $('#c-close').onclick();
  else closeModal();
});

load();
setInterval(() => {
  if (!MODAL_SLUG && !CHAT_BUSY) load();
  if (CHAT_OPEN && !CHAT_BUSY) loadChat({ keepScroll: true }); // pega mensagens vindas do Telegram/briefings
}, 20000);
</script>
